<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NPM Stats</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#0d1117; --surface:#161b22; --border:#30363d; --text:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --green:#3fb950; }
    * { box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; margin:0; }

    /* Navbar */
    .navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; }
    .navbar .brand { font-size:1.1rem; font-weight:700; color:var(--accent); }
    .navbar .sync-info { font-size:.82rem; color:var(--muted); }
    .navbar .actions { display:flex; gap:10px; align-items:center; }
    .btn-sm-dark { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 14px; border-radius:6px; cursor:pointer; font-size:.85rem; }
    .btn-sm-dark:hover { border-color:var(--accent); color:var(--accent); }
    .btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 14px; border-radius:6px; text-decoration:none; font-size:.85rem; }
    .btn-logout:hover { color:#f85149; border-color:#f85149; }

    /* Tabs */
    .tab-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; display:flex; }
    .tab-btn { background:none; border:none; color:var(--muted); padding:14px 20px; cursor:pointer; font-size:.9rem; border-bottom:2px solid transparent; transition:.2s; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

    /* Content */
    .content { padding:24px; max-width:1400px; margin:0 auto; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* Stat cards */
    .stat-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:16px; margin-bottom:24px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px; overflow:hidden; }
    .stat-card .label { font-size:.8rem; color:var(--muted); margin-bottom:6px; }
    .stat-card .value { font-size:1.8rem; font-weight:700; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .stat-card .sub { font-size:.75rem; color:var(--muted); margin-top:4px; }

    /* Table */
    .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    table { width:100%; border-collapse:collapse; font-size:.88rem; }
    thead th { background:#1c2128; color:var(--muted); padding:10px 16px; text-align:left; font-weight:600; font-size:.78rem; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); white-space:nowrap; }
    tbody tr { border-bottom:1px solid #21262d; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:#1c2128; }
    tbody td { padding:10px 16px; }
    .row-clickable { cursor:pointer; }
    .row-clickable:hover td:first-child { color:var(--accent); }

    /* Badges */
    .badge-domain { background:#388bfd1a; color:#58a6ff; border:1px solid #388bfd40; padding:2px 8px; border-radius:4px; font-size:.78rem; font-family:monospace; }
    .badge-ip-zj  { background:#3fb9501a; color:#3fb950; border:1px solid #3fb95040; padding:2px 8px; border-radius:4px; font-size:.78rem; font-family:monospace; }
    .badge-ip-out { background:#f851491a; color:#f85149; border:1px solid #f8514940; padding:2px 8px; border-radius:4px; font-size:.78rem; font-family:monospace; }
    .badge-ip-unk { background:#8b949e1a; color:#8b949e; border:1px solid #8b949e40; padding:2px 8px; border-radius:4px; font-size:.78rem; font-family:monospace; }
    .badge-loc { display:inline-block; font-size:.72rem; color:#d29922; background:#d299221a; border:1px solid #d2992240; padding:1px 6px; border-radius:3px; margin-left:4px; vertical-align:middle; }
    .count-bar { display:inline-block; background:var(--accent); height:4px; border-radius:2px; vertical-align:middle; margin-left:8px; opacity:.4; max-width:80px; }

    /* Filters */
    .filters { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; align-items:flex-end; }
    .filter-group { display:flex; flex-direction:column; gap:4px; }
    .filter-group label { font-size:.78rem; color:var(--muted); }
    .form-ctrl { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:7px 12px; border-radius:6px; font-size:.85rem; }
    .form-ctrl:focus { outline:none; border-color:var(--accent); }
    select.form-ctrl option { background:var(--surface); }
    .btn-filter { background:#238636; border:none; color:#fff; padding:8px 18px; border-radius:6px; cursor:pointer; font-size:.85rem; }
    .btn-filter:hover { background:#2ea043; }

    /* Pagination */
    .pagination { display:flex; gap:6px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
    .page-btn { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:.85rem; }
    .page-btn:hover,.page-btn.active { border-color:var(--accent); color:var(--accent); }
    .page-info { color:var(--muted); font-size:.82rem; text-align:center; margin-top:8px; }

    /* Chart */
    .chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; }
    .chart-title { font-size:.9rem; color:var(--muted); margin-bottom:16px; }

    /* Sync log */
    .sync-item { display:flex; gap:12px; align-items:flex-start; padding:10px 0; border-bottom:1px solid #21262d; }
    .sync-item:last-child { border-bottom:none; }
    .sync-dot { width:8px; height:8px; border-radius:50%; margin-top:6px; flex-shrink:0; }
    .dot-success { background:var(--green); }
    .dot-error   { background:#f85149; }
    .dot-running { background:#d29922; }

    /* Detail header */
    .detail-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .detail-title  { font-size:1.1rem; font-weight:600; color:var(--text); }
    .btn-back { background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 12px; border-radius:6px; cursor:pointer; font-size:.82rem; }
    .btn-back:hover { color:var(--text); border-color:var(--text); }

    .loading { color:var(--muted); text-align:center; padding:40px; font-size:.9rem; }
    .empty   { color:var(--muted); text-align:center; padding:40px; }
  </style>
</head>
<body>

<nav class="navbar">
  <span class="brand">NPM Stats</span>
  <span class="sync-info" id="syncInfo">加载中...</span>
  <div class="actions">
    <button class="btn-sm-dark" onclick="triggerSync(this)">⟳ 立即同步</button>
    <a href="/logout" class="btn-logout">退出</a>
  </div>
</nav>

<div class="tab-bar">
  <button class="tab-btn active" id="tabBtn-overview" onclick="switchTab('overview',this)">概览</button>
  <button class="tab-btn" id="tabBtn-detail"   onclick="switchTab('detail',this)">访问明细</button>
  <button class="tab-btn" id="tabBtn-trend"    onclick="switchTab('trend',this)">趋势图</button>
  <button class="tab-btn" id="tabBtn-synclog"  onclick="switchTab('synclog',this)">同步日志</button>
</div>

<div class="content">

  <!-- ── Overview ── -->
  <div class="tab-panel active" id="tab-overview">
    <div class="stat-cards" id="statCards"><div class="loading">加载中...</div></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>域名</th><th>总访问次数</th><th>独立IP数</th><th>最后访问</th><th>最早记录</th>
        </tr></thead>
        <tbody id="summaryBody"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ── Detail ── -->
  <div class="tab-panel" id="tab-detail">
    <div class="detail-header">
      <button class="btn-back" onclick="backToOverview()">← 返回概览</button>
      <span class="detail-title" id="detailTitle">访问明细</span>
    </div>
    <div class="filters">
      <div class="filter-group">
        <label>域名</label>
        <select class="form-ctrl" id="filterDomain" style="min-width:220px">
          <option value="">全部域名</option>
        </select>
      </div>
      <div class="filter-group">
        <label>开始日期</label>
        <input type="date" class="form-ctrl" id="filterFrom">
      </div>
      <div class="filter-group">
        <label>结束日期</label>
        <input type="date" class="form-ctrl" id="filterTo">
      </div>
      <div class="filter-group">
        <label>排序方式</label>
        <select class="form-ctrl" id="sortBy">
          <option value="date">按访问时间倒序</option>
          <option value="count">按访问次数倒序</option>
        </select>
      </div>
      <button class="btn-filter" onclick="loadDetail(1)">查询</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>域名</th><th>来源IP</th><th>日期</th><th>访问次数</th><th>归属地</th></tr></thead>
        <tbody id="detailBody"><tr><td colspan="5" class="loading">请选择条件后查询</td></tr></tbody>
      </table>
    </div>
    <div class="pagination" id="detailPagination"></div>
    <div class="page-info" id="detailPageInfo"></div>
  </div>

  <!-- ── Trend ── -->
  <div class="tab-panel" id="tab-trend">
    <div class="filters">
      <div class="filter-group">
        <label>域名</label>
        <select class="form-ctrl" id="trendDomain" style="min-width:220px">
          <option value="">全站合计</option>
        </select>
      </div>
      <div class="filter-group">
        <label>时间范围</label>
        <select class="form-ctrl" id="trendDays">
          <option value="7">最近 7 天</option>
          <option value="30" selected>最近 30 天</option>
          <option value="90">最近 90 天</option>
        </select>
      </div>
      <button class="btn-filter" onclick="loadTrend()">查看</button>
    </div>
    <div class="chart-wrap">
      <div class="chart-title" id="chartTitle">日访问量趋势</div>
      <canvas id="trendChart" height="100"></canvas>
    </div>
  </div>

  <!-- ── Sync Log ── -->
  <div class="tab-panel" id="tab-synclog">
    <div class="table-wrap" style="padding:16px">
      <div id="syncLogList"><div class="loading">加载中...</div></div>
    </div>
  </div>

</div>

<script>
// ── Tab ───────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  (btn || document.getElementById('tabBtn-' + name)).classList.add('active');
  if (name === 'trend')   loadTrend();
  if (name === 'synclog') loadSyncLog();
}

function backToOverview() { switchTab('overview'); }

// Navigate from overview domain row → detail tab pre-filtered
function viewDomain(domain) {
  document.getElementById('filterDomain').value = domain;
  document.getElementById('detailTitle').textContent = '访问明细 — ' + domain;
  switchTab('detail');
  loadDetail(1);
}

// ── Overview ─────────────────────────────────────────────────────────────────
async function loadSummary() {
  const res  = await fetch('/api/summary');
  const rows = await res.json();

  const totalHits = rows.reduce((s, r) => s + Number(r.total), 0);
  const totalIPs  = rows.reduce((s, r) => s + Number(r.unique_ips), 0);

  document.getElementById('statCards').innerHTML = `
    <div class="stat-card"><div class="label">代理域名数</div><div class="value">${rows.length}</div></div>
    <div class="stat-card"><div class="label">总访问次数</div><div class="value">${fmt(totalHits)}</div></div>
    <div class="stat-card"><div class="label">独立来源IP</div><div class="value">${fmt(totalIPs)}</div></div>
    <div class="stat-card"><div class="label">最活跃域名</div>
      <div class="value" style="font-size:1rem;word-break:break-all">${rows[0]?.domain||'-'}</div>
      <div class="sub">${fmt(rows[0]?.total||0)} 次</div></div>`;

  const maxHits = Number(rows[0]?.total) || 1;
  document.getElementById('summaryBody').innerHTML = rows.length
    ? rows.map(r => `
      <tr class="row-clickable" onclick="viewDomain('${esc(r.domain)}')">
        <td><span class="badge-domain">${esc(r.domain)}</span></td>
        <td>${fmt(r.total)}<span class="count-bar" style="width:${Math.round(Number(r.total)/maxHits*80)}px"></span></td>
        <td>${fmt(r.unique_ips)}</td>
        <td>${r.last_seen  || '-'}</td>
        <td>${r.first_seen || '-'}</td>
      </tr>`).join('')
    : '<tr><td colspan="5" class="empty">暂无数据</td></tr>';
}

// ── Detail ────────────────────────────────────────────────────────────────────
async function loadDetail(page) {
  const domain = document.getElementById('filterDomain').value;
  const from   = document.getElementById('filterFrom').value;
  const to     = document.getElementById('filterTo').value;
  const sort   = document.getElementById('sortBy').value;
  const params = new URLSearchParams({
    page, sort,
    ...(domain && {domain}),
    ...(from   && {from}),
    ...(to     && {to}),
  });

  document.getElementById('detailBody').innerHTML =
    '<tr><td colspan="5" class="loading">加载中...</td></tr>';

  const res  = await fetch('/api/detail?' + params);
  const data = await res.json();

  document.getElementById('detailBody').innerHTML = data.data.length
    ? data.data.map(r => {
        const ipBadge = ipBadgeHtml(r.client_ip, r.is_zhejiang, r.region, r.country);
        const locBadge = locationBadge(r.is_zhejiang, r.region, r.country);
        return `<tr>
          <td><span class="badge-domain">${esc(r.domain)}</span></td>
          <td>${ipBadge}</td>
          <td>${r.access_date}</td>
          <td>${fmt(r.count)}</td>
          <td>${locBadge}</td>
        </tr>`;
      }).join('')
    : '<tr><td colspan="5" class="empty">无数据</td></tr>';

  renderPagination(page, data.total, data.per_page);
}

function ipBadgeHtml(ip, isZj, region, country) {
  if (isZj === 1)  return `<span class="badge-ip-zj">${esc(ip)}</span>`;
  if (isZj === 0)  return `<span class="badge-ip-out">${esc(ip)}</span>`;
  return `<span class="badge-ip-unk">${esc(ip)}</span>`;   // -1 = not queried yet
}

function locationBadge(isZj, region, country) {
  if (isZj === 1)  return '<span style="color:var(--green);font-size:.8rem">浙江</span>';
  if (isZj === 0) {
    const loc = [country, region].filter(Boolean).join(' / ') || '非浙江';
    return `<span class="badge-loc">⚑ ${esc(loc)}</span>`;
  }
  return '<span style="color:var(--muted);font-size:.8rem">待查询</span>';
}

function renderPagination(page, total, perPage) {
  const pages = Math.ceil(total / perPage);
  document.getElementById('detailPageInfo').textContent =
    `共 ${fmt(total)} 条，第 ${page} / ${pages} 页`;
  const container = document.getElementById('detailPagination');
  if (pages <= 1) { container.innerHTML = ''; return; }
  const start = Math.max(1, page - 3), end = Math.min(pages, page + 3);
  let html = '';
  if (page > 1) html += `<button class="page-btn" onclick="loadDetail(${page-1})">‹ 上一页</button>`;
  for (let i = start; i <= end; i++)
    html += `<button class="page-btn ${i===page?'active':''}" onclick="loadDetail(${i})">${i}</button>`;
  if (page < pages) html += `<button class="page-btn" onclick="loadDetail(${page+1})">下一页 ›</button>`;
  container.innerHTML = html;
}

// ── Trend ─────────────────────────────────────────────────────────────────────
let trendChartInst = null;
async function loadTrend() {
  const domain = document.getElementById('trendDomain').value;
  const days   = document.getElementById('trendDays').value;
  const params = new URLSearchParams({ days, ...(domain && {domain}) });
  const res    = await fetch('/api/trend?' + params);
  const data   = await res.json();

  document.getElementById('chartTitle').textContent =
    (domain || '全站') + ` · 最近 ${days} 天访问趋势`;

  if (trendChartInst) trendChartInst.destroy();
  trendChartInst = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: data.map(r => r.access_date),
      datasets: [{
        label: '访问次数',
        data:  data.map(r => Number(r.total)),
        borderColor: '#58a6ff',
        backgroundColor: 'rgba(88,166,255,.12)',
        fill: true, tension: .3,
        pointBackgroundColor: '#58a6ff',
        pointRadius: data.length > 60 ? 2 : 4,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display:false } },
      scales: {
        x: { ticks:{ color:'#8b949e', maxRotation:45 }, grid:{ color:'#21262d' } },
        y: { ticks:{ color:'#8b949e' }, grid:{ color:'#21262d' }, beginAtZero:true }
      }
    }
  });
}

// ── Sync Log ──────────────────────────────────────────────────────────────────
async function loadSyncLog() {
  const res  = await fetch('/api/sync/status');
  const rows = await res.json();
  document.getElementById('syncLogList').innerHTML = rows.length
    ? rows.map(r => `
      <div class="sync-item">
        <div class="sync-dot dot-${r.status}"></div>
        <div>
          <div style="font-size:.85rem">${esc(r.message)}</div>
          <div style="font-size:.78rem;color:var(--muted);margin-top:3px">${r.synced_at} · ${r.status}</div>
        </div>
      </div>`).join('')
    : '<div class="empty">暂无同步记录</div>';
}

async function loadSyncStatus() {
  const res  = await fetch('/api/sync/status');
  const rows = await res.json();
  if (rows.length) {
    const last = rows[0];
    document.getElementById('syncInfo').textContent =
      `上次同步: ${last.synced_at}  [${last.status}]`;
  }
}

async function triggerSync(btn) {
  btn.disabled = true; btn.textContent = '同步中...';
  await fetch('/api/sync/trigger', { method:'POST' });
  setTimeout(() => { btn.disabled=false; btn.textContent='⟳ 立即同步'; loadSyncStatus(); }, 3000);
}

// ── Domains ───────────────────────────────────────────────────────────────────
async function loadDomains() {
  const res  = await fetch('/api/domains');
  const list = await res.json();
  ['filterDomain','trendDomain'].forEach(id => {
    const sel   = document.getElementById(id);
    const first = sel.options[0].outerHTML;
    sel.innerHTML = first + list.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString('zh-CN'); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  await Promise.all([loadSummary(), loadDomains(), loadSyncStatus()]);
})();
</script>
</body>
</html>
