<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NPM Stats · 登录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; min-height: 100vh; display: flex; align-items: center; }
    .card { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; border-radius: 12px; }
    .form-control { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; }
    .form-control:focus { background: #0d1117; color: #c9d1d9; border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,.2); }
    .btn-primary { background: #238636; border-color: #238636; }
    .btn-primary:hover { background: #2ea043; border-color: #2ea043; }
    h3 { color: #58a6ff; font-weight: 700; letter-spacing: .5px; }
    .subtitle { color: #8b949e; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-lg p-4 mt-4">
          <div class="text-center mb-4">
            <h3>📊 NPM Stats</h3>
            <p class="subtitle">Nginx Proxy Manager 访问统计</p>
          </div>
          {% if error %}
          <div class="alert alert-danger py-2">{{ error }}</div>
          {% endif %}
          <form method="post">
            <div class="mb-3">
              <input type="text" name="username" class="form-control" placeholder="用户名" autofocus required>
            </div>
            <div class="mb-3">
              <input type="password" name="password" class="form-control" placeholder="密码" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">登录</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
